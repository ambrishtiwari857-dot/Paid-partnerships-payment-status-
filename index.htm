<!DOCTYPE html>
<html>
<head>
  <title>Live Payment Records</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .live {
      text-align:center;
      color:#22c55e;
      margin-bottom:5px;
    }

    .total {
      text-align: center;
      font-size: 20px;
      color: #22c55e;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,150,0.2);
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #020617;
      color: #22c55e;
    }

    .amount {
      color: #22c55e;
      font-weight: bold;
    }

    .new-row {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* popup */
    .popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #22c55e;
      color: black;
      padding: 12px 15px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    /* live dot */
    .dot {
      height:8px;
      width:8px;
      background:#22c55e;
      border-radius:50%;
      display:inline-block;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%{opacity:1;}
      50%{opacity:0.3;}
      100%{opacity:1;}
    }
  </style>
</head>

<body>

<h2>💳 Live Payment Records</h2>

<div class="live">
  <span class="dot"></span> LIVE
</div>

<div class="total">
  Total Earnings: ₹<span id="total">0</span>
</div>

<table id="table">
  <tr>
    <th>User</th>
    <th>Details</th>
    <th>Date</th>
  </tr>
</table>

<div id="popup" class="popup"></div>

<!-- 🔊 sound -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let names = [
  "Ramesh Kumar","Suresh Patel","Amit Singh","Rahul Verma",
  "Neha Sharma","Ankit Yadav","Priya Gupta","Vikas Kumar",
  "Manoj Singh","Pooja Verma","Deepak Yadav","Kiran Gupta"
];

let cities = ["Delhi","Mumbai","Kolkata","Chennai","Bangalore","Hyderabad"];

let total = 0;

function getDate(){
  let d = new Date();
  return d.toLocaleDateString('en-IN',{
    day:'numeric',month:'short',year:'numeric'
  });
}

function showPopup(name, amount, city){
  let popup = document.getElementById("popup");
  popup.innerText = `${name} from ${city} paid ₹${amount}`;
  popup.style.display = "block";

  document.getElementById("sound").play();

  setTimeout(()=>{
    popup.style.display = "none";
  }, 3000);
}

function animateTotal(newAmount){
  let el = document.getElementById("total");
  let start = total - newAmount;
  let end = total;
  let step = Math.ceil(newAmount/20);

  let interval = setInterval(()=>{
    start += step;
    if(start >= end){
      el.innerText = end;
      clearInterval(interval);
    } else {
      el.innerText = start;
    }
  }, 20);
}

function addRow(){
  let table = document.getElementById("table");

  if(names.length === 0) return;

  let name = names.splice(Math.floor(Math.random()*names.length),1)[0];
  let city = cities[Math.floor(Math.random()*cities.length)];
  let amount = Math.floor(Math.random()*1000)+200;
  let monthly = Math.floor(Math.random()*5000)+1000;

  total += amount;

  animateTotal(amount);

  let row = table.insertRow(-1);
  row.classList.add("new-row");

  row.innerHTML = `
    <td>${name} (${city})</td>
    <td class="amount">
      ${name} paid ₹${amount}<br>
      Monthly earnings: ₹${monthly}
    </td>
    <td>${getDate()}</td>
  `;

  showPopup(name, amount, city);
}

// auto add
setInterval(addRow, 3000);
</script>

</body>
</html>
