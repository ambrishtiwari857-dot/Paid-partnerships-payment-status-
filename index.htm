<!DOCTYPE html>
<html>
<head>
  <title>Payment Records (Demo)</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      margin: 0;
      padding: 20px;
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,255,150,0.2);
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #020617;
      color: #22c55e;
    }

    tr:hover {
      background: #334155;
    }

    .amount {
      font-weight: bold;
      color: #22c55e;
    }

    .demo {
      text-align:center;
      margin-top:10px;
      font-size:12px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<h2>💳 Payment Records</h2>

<table>

    <th>Transactions</th>

  <tr>

  <tr>

  </tr>

  <tr>

  </tr>

  <tr>

</table>

</div>

</html>
