<!DOCTYPE html>
<html>
<head>
  <title>Payment Records</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { text-align: center; }

    .total {
      text-align: center;
      margin-bottom: 10px;
      color: #22c55e;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #020617;
      color: #22c55e;
    }

    .amount {
      color: #22c55e;
      font-weight: bold;
    }

    .new-row {
      animation: glow 1s ease-in-out;
    }

    @keyframes glow {
      0% { background: #065f46; }
      100% { background: transparent; }
    }
  </style>
</head>

<body>

<h2>💳 Payment Records</h2>

<div class="total">
  Total Earnings: ₹<span id="totalAmount">0</span>
</div>

<table id="table">
  <tr>
    <th>User</th>
    <th>Transactions</th>
    <th>Amount</th>
    <th>Date</th>
  </tr>
</table>

<script>
let names = [
  "Ramesh Kumar","Suresh Patel","Amit Singh","Rahul Verma",
  "Neha Sharma","Ankit Yadav","Priya Gupta","Vikas Kumar",
  "Manoj Singh","Pooja Verma","Deepak Yadav","Kiran Gupta"
];

function getDate() {
  let now = new Date();
  return now.toLocaleDateString('en-IN', {
    day:'numeric', month:'short', year:'numeric'
  });
}

function saveData(data) {
  localStorage.setItem("payments", JSON.stringify(data));
}

function loadData() {
  return JSON.parse(localStorage.getItem("payments")) || [];
}

function renderTable(data) {
  let table = document.getElementById("table");

  // clear old rows
  table.innerHTML = `
    <tr>
      <th>User</th>
      <th>Transactions</th>
      <th>Amount</th>
      <th>Date</th>
    </tr>
  `;

  let total = 0;

  data.forEach(row => {
    let tr = table.insertRow(-1);
    tr.innerHTML = `
      <td>${row.name}</td>
      <td>${row.txn}</td>
      <td class="amount">${row.amount}</td>
      <td>${row.date}</td>
    `;
    total += row.amount;
  });

  document.getElementById("totalAmount").innerText = total;
}

function addRow() {
  let data = loadData();

  if (names.length === 0) return;

  let index = Math.floor(Math.random()*names.length);
  let name = names.splice(index,1)[0];

  let newEntry = {
    name: name,
    txn: Math.floor(Math.random()*5)+1,
    amount: Math.floor(Math.random()*1000)+200,
    date: getDate()
  };

  data.push(newEntry);
  saveData(data);
  renderTable(data);
}

// load on start
let savedData = loadData();
renderTable(savedData);

// auto add new row
setInterval(addRow, 4000);
</script>

</body>
</html>
