<!DOCTYPE html>
<html>
<head>
  <title>Payment Records</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .total {
      text-align: center;
      margin-bottom: 10px;
      font-size: 18px;
      color: #22c55e;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,255,150,0.2);
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #020617;
      color: #22c55e;
    }

    .amount {
      color: #22c55e;
      font-weight: bold;
    }

    /* 🔥 Animation */
    .new-row {
      animation: glow 1s ease-in-out;
    }

    @keyframes glow {
      0% { background: #065f46; }
      100% { background: transparent; }
    }
  </style>
</head>

<body>

<h2>💳 Payment Records</h2>

<div class="total">
  Total Earnings: ₹<span id="totalAmount">0</span>
</div>

<table id="table">
  <tr>
    <th>User</th>
    <th>Transactions</th>
    <th>Amount (₹)</th>
  </tr>

  <tr>
    <td>Ramesh Kumar</td>
    <td>3</td>
    <td class="amount">800</td>
  </tr>

  <tr>
    <td>Suresh Patel</td>
    <td>2</td>
    <td class="amount">650</td>
  </tr>

</table>

<script>
const names = [
  "Amit Singh","Rahul Verma","Neha Sharma",
  "Ankit Yadav","Priya Gupta","Vikas Kumar"
];

function addRow() {
  let table = document.getElementById("table");

  let name = names[Math.floor(Math.random()*names.length)];
  let txn = Math.floor(Math.random()*5)+1;
  let amount = Math.floor(Math.random()*1000)+200;

  let row = table.insertRow(-1);
  row.classList.add("new-row");

  row.innerHTML = `
    <td>${name}</td>
    <td>${txn}</td>
    <td class="amount">${amount}</td>
  `;

  updateTotal();
}

function updateTotal() {
  let amounts = document.querySelectorAll(".amount");
  let total = 0;

  amounts.forEach(el => {
    total += parseInt(el.innerText);
  });

  document.getElementById("totalAmount").innerText = total;
}

// initial total
updateTotal();

// हर 3 sec में new row add होगा
setInterval(addRow, 3000);
</script>

</body>
</html>
